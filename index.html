                             class="float-item"
                             :class="{
                                 'animal-roam': item.type === 'animal' && !isDragging(item.id) && !isEditMode,
                                 'is-dragging': isDragging(item.id),
                                 'edit-highlight': isEditMode && selectedLayerItem?.id === item.id,
                                 'highland-jump-up':   jumpStates[item.id]==='up',
                                 'highland-jump-down': jumpStates[item.id]==='down'
                             }"
                             :style="{
                                 left:   getPos(item, index).x + '%',
                                 top:    getPos(item, index).y + '%',
                                 zIndex: isDragging(item.id) ? 999 : getItemZIndex(item, index)
                             }"
                             @mousedown.prevent="(item.type==='animal' || isEditMode) && onDragStart($event, item)"
                             @touchstart.prevent="(item.type==='animal' || isEditMode) && onDragStart($event, item)">
                            <div :style="{
                                transform: getFlip(item) + ' scale(' + (item.scale || 1) + ')' + getHighlandLift(item, index),
                                transition: isDragging(item.id) ? 'none' : 'transform 0.4s ease',
                                transformOrigin: 'center bottom'
                            }">
                                <img v-if="item.imgUrl" :src="item.imgUrl" @error="handleImageError(item)" :alt="item.name">
                                <span v-else class="emoji-icon">{{ item.emoji }}</span>
                            </div>
                            <div v-if="isEditMode" class="item-edit-btns">
                                <button @click.stop="toggleFlip(item)" class="flip-btn" title="左右鏡射"><i class="fa-solid fa-right-left"></i></button>
                                <button v-if="item.type === 'decor'" @click.stop="scaleItem(item, -0.15)" class="scale-btn" title="縮小"><i class="fa-solid fa-minus"></i></button>
                                <button v-if="item.type === 'decor'" @click.stop="scaleItem(item, 0.15)"  class="scale-btn" title="放大"><i class="fa-solid fa-plus"></i></button>
                                <button @click.stop="selectLayerItem(item)" class="layer-btn" :class="{ active: selectedLayerItem?.id === item.id }" title="圖層"><i class="fa-solid fa-layer-group"></i></button>
                                <button @click.stop="removeFromIsland(item)" class="remove-btn"><i class="fa-solid fa-minus"></i></button>
                            </div>
                        </div>



                        <!-- 置中按鈕（右下角） -->
                        <button class="island-center-btn" @click="centerHomeIsland" title="置中">
                            <i class="fa-solid fa-crosshairs"></i>
                        </button>

                        <!-- 地形遮擋層 Canvas（高地前側面，疊在物品上方） -->
                        <canvas id="island-overlay"
                            style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;border-radius:var(--radius-lg);">
                        </canvas>

                        <!-- 圖層面板（疊在島上，編輯+選中時顯示） -->
                        <div v-if="isEditMode && selectedLayerItem" class="layer-panel" style="position:absolute;top:60px;left:16px;width:260px;z-index:20;">
                            <div class="layer-panel-header">
                                <span class="layer-panel-title">圖層：{{ selectedLayerItem.name }}</span>
                                <button @click="selectedLayerItem = null" class="pool-close">✕</button>
                            </div>
                            <div class="layer-controls">
                                <button @click="moveLayer(selectedLayerItem, 'top')"    class="layer-ctrl-btn"><i class="fa-solid fa-angles-up"></i> 最前</button>
                                <button @click="moveLayer(selectedLayerItem, 'up')"     class="layer-ctrl-btn"><i class="fa-solid fa-angle-up"></i> 往前</button>
                                <button @click="moveLayer(selectedLayerItem, 'down')"   class="layer-ctrl-btn"><i class="fa-solid fa-angle-down"></i> 往後</button>
                                <button @click="moveLayer(selectedLayerItem, 'bottom')" class="layer-ctrl-btn"><i class="fa-solid fa-angles-down"></i> 最後</button>
                            </div>
                            <div class="layer-list">
                                <div v-for="(item, idx) in [...displayIslandItems].reverse()" :key="item.id"
                                     class="layer-list-item" :class="{ active: selectedLayerItem?.id === item.id }"
                                     @click="selectedLayerItem = item">
                                    <span class="layer-list-icon">
                                        <img v-if="item.imgUrl" :src="item.imgUrl" @error="handleImageError(item)" style="width:20px;height:20px;object-fit:contain;">
                                        <span v-else style="font-size:16px;">{{ item.emoji }}</span>
                                    </span>
                                    <span class="layer-list-name">{{ item.name }}</span>
                                    <span class="layer-list-num">{{ displayIslandItems.length - idx }}</span>
                                </div>
                            </div>
                        </div>

                        <!-- 倉庫（疊在島底部，編輯模式才顯示） -->
                        <!-- 倉庫（右側彈出面板，編輯模式才顯示） -->
                        <div v-if="isEditMode" class="warehouse-panel" :class="{collapsed: warehouseCollapsed}">
                            <button class="warehouse-toggle" @click="warehouseCollapsed=!warehouseCollapsed">
                                <span class="warehouse-toggle-icon">‹</span>
                                <span class="warehouse-toggle-lbl">物品欄</span>
                            </button>
                            <div class="warehouse-header">
                                <span class="warehouse-title">🎒 物品欄</span>
                                <span class="warehouse-sub">點擊放上小島</span>
                            </div>
                            <!-- 分類 tabs -->
                            <div class="warehouse-filter">
                                <button v-for="f in [{id:'all',l:'全部'},{id:'animal',l:'🐾 島民'},{id:'decor',l:'🏕️ 裝飾'},{id:'rare',l:'💎 稀有+'},{id:'new',l:'🆕 最新'}]"
                                    :key="f.id" class="wf-btn" :class="{active: warehouseFilter===f.id}"
                                    @click="warehouseFilter=f.id">{{ f.l }}</button>
                            </div>
                            <div v-if="filteredWarehouse.length === 0" class="warehouse-empty">
                                <div style="font-size:32px;margin-bottom:8px;">🌊</div>
                                {{ warehouseItems.length === 0 ? '倉庫是空的，去抽卡吧！' : '這個分類沒有物品' }}
                            </div>
                            <div v-else class="warehouse-scroll">
                                <div class="warehouse-grid">
                                    <div v-for="group in filteredWarehouse" :key="group.key"
                                         @click="placeOnIsland(group.items[0])" class="warehouse-item">
                                        <div class="warehouse-item-icon" style="position:relative;">
                                            <img v-if="group.items[0].imgUrl" :src="group.items[0].imgUrl" @error="handleImageError(group.items[0])" :alt="group.items[0].name">
                                            <span v-else class="emoji-icon" style="font-size:36px;">{{ group.items[0].emoji }}</span>
                                            <span v-if="group.count > 1" class="qty-badge">{{ group.count }}</span>
                                        </div>
                                        <div class="warehouse-item-name">{{ group.items[0].name }}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 島嶼地形編輯器 Tab -->
            <div v-else-if="currentTab === 'island'" key="island" class="tab-content island-tab">

                <!-- 桌機：左側工具欄 -->
                <div class="island-sidebar">
                    <div class="is-panel">
                        <div class="is-sec">模式</div>
                        <button class="is-mode-btn" :class="{on: islandEditMode}" @click="islandEditMode=!islandEditMode">
                            {{ islandEditMode ? '👁️ 插畫預覽' : '✏️ 進入編輯' }}
                        </button>
                    </div>
                    <div class="is-panel" v-show="islandEditMode">
                        <div class="is-sec">視角</div>
                        <button v-for="t in islandTools" :key="t.id"
                            class="is-btn" :class="{active: islandTool===t.id}"
                            :data-tool="t.id" @click="islandTool=t.id">
                            <span class="is-icon">{{ t.icon }}</span>
                            <span><span class="is-name">{{ t.label }}</span><span class="is-sub">{{ t.sub }}</span></span>
                        </button>
                        <div class="is-sec" style="margin-top:8px;">筆刷大小</div>
                        <div class="is-sz-row">
                            <button v-for="s in [1,2,3]" :key="s"
                                class="is-sz" :class="{active: islandBrush===s}"
                                @click="islandBrush=s">{{ s }}</button>
                        </div>
                    </div>
                    <div class="is-panel">
                        <div class="is-sec">操作</div>
                        <button class="is-act center" @click="islandCenterView">🎯 回到中心</button>
                        <button class="is-act reset"  @click="islandReset">↺ 重置</button>
                    </div>
                    <div class="is-panel">
                        <div class="is-sec">圖例</div>
                        <div class="is-legend">
                            <div class="is-leg"><div class="is-dot" style="background:#6ac678"></div>草地</div>
                            <div class="is-leg"><div class="is-dot" style="background:#66a4ff"></div>湖水</div>
                            <div class="is-leg"><div class="is-dot" style="background:#79db84"></div>高地</div>
                        </div>
                    </div>
                </div>

                <!-- Canvas 主區域 -->
                <div class="island-canvas-area">
                    <canvas id="island-editor-canvas" :style="{cursor: islandEditMode && islandTool!=='pan' ? 'crosshair' : 'grab'}"></canvas>
                    <div v-if="islandEditMode" class="island-edit-badge">✏️ 編輯模式</div>
                    <div class="island-hint-bar">{{ islandEditorHint }}</div>
                </div>

                <!-- 手機底部工具欄 -->
                <div class="island-mobile-bar">
                    <div class="imb-scroll">
                        <button class="imb-btn" :class="{on: islandEditMode}" @click="islandEditMode=!islandEditMode">
                            {{ islandEditMode ? '👁️' : '✏️' }}<span class="imb-lbl">{{ islandEditMode ? '預覽' : '編輯' }}</span>
                        </button>
                        <div class="imb-sep"></div>
                        <button v-for="t in islandTools" :key="t.id"
                            class="imb-btn" :class="{active: islandTool===t.id}"
                            :data-tool="t.id" @click="islandTool=t.id">
                            {{ t.icon }}<span class="imb-lbl">{{ t.label }}</span>
                        </button>
                        <div class="imb-sep"></div>
                        <div class="imb-sz-wrap">
                            <div class="imb-sz-lbl">筆刷</div>
                            <div class="imb-sz-row">
                                <button v-for="s in [1,2,3]" :key="s"
                                    class="imb-sz" :class="{active: islandBrush===s}"
                                    @click="islandBrush=s">{{ s }}</button>
                            </div>
                        </div>
                    </div>
                    <div class="imb-acts">
                        <button class="imb-act center" @click="islandCenterView">🎯</button>
                        <button class="imb-act reset"  @click="islandReset">↺</button>
                    </div>
                </div>
            </div>

            <!-- Shop -->
            <div v-else-if="currentTab === 'shop'" key="shop" class="tab-content">
                <div class="energy-bar" style="margin-bottom:24px;">
                    <i class="fa-solid fa-bolt"></i> 目前能量：<strong>{{ currentUser?.energy || 0 }}</strong>
                </div>
                <div class="gacha-grid">

                <!-- 寵物抽卡 -->
                <div class="gacha-card">
                    <div class="gacha-card-header">
                        <div>
                            <div class="gacha-title">🐾 動物夥伴招募</div>
                            <div class="gacha-desc">招募可愛動物來到你的營地</div>
                        </div>
                        <button @click="openPool('pet')" class="pool-preview-btn">卡池一覽</button>
                    </div>
                    <div class="btn-row">
                        <button @click="triggerGacha('pet', false)" class="btn-primary" :disabled="(currentUser?.energy || 0) < 500">

        // ===== 狀態 =====

        // ── 收件人建議清單 ──

        const leaderboard = computed(() => {

            return [...users.value]
                .map(u => ({ ...u, thankCount: countMap[u.id] || 0 }))

        // ===== 物品位置統一取得（裝飾品用 item.x/y，動物用 animalStates） =====
        // 說明：item.x/y 和 animalStates.x/y 是「初始 cam 下的螢幕 %」
        // cam 移動後，物品要跟著 cam 偏移，才能留在島上正確位置
        const getCamOffset = () => {
            const el = document.getElementById('island-container');
            if (!el || !window.islandEngine) return { dx: 0, dy: 0 };
            const W = el.clientWidth, H = el.clientHeight;
            const cam = window.islandEngine.cam;
            // cam.x/y 是世界座標偏移，要換算成容器的 %
            // 初始 cam 時物品在 item.x%, item.y%
            // cam 移動 dx 個世界單位，對應螢幕 dx/W*100 %
            return {
                dx: -(cam.x / W) * 100,
                dy: -(cam.y / H) * 100
            };
        };

        // cam 初始值（autoCenter 後的值），用於計算相對偏移
        const camBase = reactive({ x: 0, y: 0 });
        const camTick = ref(0); // 每次 cam 移動就 +1，觸發 Vue re-render
        const updateCamBase = () => {
            const cam = window.islandEngine?.cam;
            if (cam) { camBase.x = cam.x; camBase.y = cam.y; }
        };

        const getPos = (item, index) => {
            void camTick.value; // 讀取 camTick 讓 Vue 追蹤依賴，cam 移動時觸發重算
            // 基礎位置（存儲值）
            let bx, by;
            if (item.type === 'animal') {
                bx = animalStates.value[item.id]?.x ?? 20;
                by = animalStates.value[item.id]?.y ?? 25;
            } else if (item.x !== undefined && item.y !== undefined) {
                bx = item.x; by = item.y;
            } else {
                const cols = 3, col = index % cols, row = Math.floor(index / cols) % 3;
                const baseX = [15, 42, 65], baseY = [15, 38, 60];
                const jitter = (index * 7919) % 10 - 5;
                bx = baseX[col] + jitter; by = baseY[row] + jitter;
            }

            // 加上 cam 偏移，讓物品跟著島嶼移動
            const el = document.getElementById('island-container');
            if (!el || !window.islandEngine) return { x: bx, y: by };
            const W = el.clientWidth, H = el.clientHeight;
            const cam = window.islandEngine.cam;
            const ddx = ((camBase.x - cam.x) / W) * 100;
            const ddy = ((camBase.y - cam.y) / H) * 100;
            return { x: bx + ddx, y: by + ddy };
        };

        // ===== 拖曳系統 =====
        const dragState = ref(null); // { item, startMouseX, startMouseY, startPosX, startPosY }

        const isDragging = (itemId) => dragState.value?.item?.id === itemId;

        const onDragStart = (e, item) => {
            // 裝飾品只有在 isEditMode 才能拖曳
            if (item.type !== 'animal' && !isEditMode.value) return;
            const touch = e.touches ? e.touches[0] : e;
            const index = displayIslandItems.value.indexOf(item);
            // 取原始存儲值（不含 cam 偏移），作為拖曳的基準點
            let rawX, rawY;
            if (item.type === 'animal') {
                rawX = animalStates.value[item.id]?.x ?? 20;
                rawY = animalStates.value[item.id]?.y ?? 25;
            } else {
                rawX = item.x ?? 30; rawY = item.y ?? 30;
            }
            dragState.value = {
                item,
                startMouseX: touch.clientX,
                startMouseY: touch.clientY,
                startPosX: rawX,  // 純存儲值
                startPosY: rawY,
                origX: rawX,
                origY: rawY,
            };
        };

        const onDragMove = (e) => {
            if (!dragState.value) return;
            const touch = e.touches ? e.touches[0] : e;
            const container = document.getElementById('island-container');
            if (!container) return;

            const rect  = container.getBoundingClientRect();
            const dx    = touch.clientX - dragState.value.startMouseX;
            const dy    = touch.clientY - dragState.value.startMouseY;
            const dxPct = (dx / rect.width)  * 100;
            const dyPct = (dy / rect.height) * 100;

            // newX/Y 是純存儲值（基於 startPosX 原始值 + 滑鼠位移）
            const newX = Math.min(90, Math.max(0, dragState.value.startPosX + dxPct));
            const newY = Math.min(85, Math.max(0, dragState.value.startPosY + dyPct));

            // 把純存儲值換算成顯示值，用於地形檢測
            const el2 = document.getElementById('island-container');
            const W2 = el2?.clientWidth||rect.width, H2 = el2?.clientHeight||rect.height;
            const cam2 = window.islandEngine?.cam;
            const dispX = cam2 ? newX + ((camBase.x - cam2.x) / W2) * 100 : newX;
            const dispY = cam2 ? newY + ((camBase.y - cam2.y) / H2) * 100 : newY;

            const item    = dragState.value.item;
            const terrain = getTerrainAt(dispX, dispY);

            // 湖水或島外：不允許移動
            if (!terrain.onIsland || terrain.ci === 1) return;

            if (item.type === 'animal') {
                if (animalStates.value[item.id]) {
                    animalStates.value[item.id].x = newX;  // 存純值
                    animalStates.value[item.id].y = newY;
                }
            } else {
                item.x = newX;  // 存純值
                item.y = newY;
            }
        };

        const onDragEnd = () => {
            if (!dragState.value) return;
            const item = dragState.value.item;
            const container = document.getElementById('island-container');

            // 島民：放開時如果不在島上，彈回原始位置
            if (item.type === 'animal' && container) {
                const rect = container.getBoundingClientRect();
                const pos  = getPos(item, displayIslandItems.value.indexOf(item));
                const onIsl = window.islandEngine?.isOnIsland(pos.x, pos.y, rect.width, rect.height) ?? true;
                if (!onIsl) {
                    const orig = dragState.value;
                    if (animalStates.value[item.id]) {
                        animalStates.value[item.id].x = orig.origX;
                        animalStates.value[item.id].y = orig.origY;
                    }
                }
            }

            dragState.value = null;
            saveData();
        };

        // ── Home canvas pan（拖曳移動視角） ──
        const homePan = ref(null);

            const src = e.touches ? e.touches[0] : e;
            const cam = window.islandEngine?.cam || {x:0,y:0};
            homePan.value = { cx: src.clientX, cy: src.clientY, camX: cam.x, camY: cam.y };

        // ===== Firebase 認證 =====

        const forceReset = async () => {

        // ===== 輔助函式 =====
        const getUserById = (id) => users.value.find(u => u.id === id) || { name: '未知', island: [] };
        const getDisplayName = (id) => {

        };
        const getDisplayInitial = (id) => getDisplayName(id).charAt(0).toUpperCase();
        const formatDate = (ts) => {
            const diff = Math.floor((Date.now() - ts) / 60000);
            if (diff < 1)    return 'Just now';
            if (diff < 60)   return `${diff}m ago`;
            if (diff < 1440) return `${Math.floor(diff/60)}h ago`;
            return new Date(ts).toLocaleDateString('zh-TW', { month: 'numeric', day: 'numeric' });
        };

        // ===== 操作函式 =====
        const switchUser = (id) => {
            currentUserId.value = id;
            visitingId.value    = null;

        const adjustCardCost = (d) => {

        const sendLetter = async () => {

            const sender   = users.value.find(u => u.id === currentUserId.value);
            const receiver = users.value.find(u => u.id === letterForm.toId);
            const cost     = letterForm.cost;
            if (sender.cards < cost) return;

            sender.cards -= cost;

            // 寄出累積卡數 → 每 3 張送 1 片板塊
            if (!sender.sentCards) sender.sentCards = 0;
            sender.sentCards += cost;
            while (sender.sentCards >= 3) {
                sender.sentCards -= 3;
                sender.tileCount = (sender.tileCount || 6) + 1;
            }

            if (receiver) {
                const bonus = (Math.floor(Math.random() * 450) + 50) * cost;
                receiver.shells += bonus;
                receiver.energy += 100 * cost;
                // 收到感謝卡 → 放入信箱待領取板塊
                if (!receiver.rewards) receiver.rewards = [];
                for (let i = 0; i < cost; i++) {
                    receiver.rewards.push({
                        id: Date.now() + i,
                        type: 'tile',
                        title: '🏝️ 獲得島嶼板塊！',
                        desc: `${sender.name} 送了你感謝，帶來 1 片新的板塊！快去擴張你的小島吧 🌟`,
                        claimed: false
                    });
                }
            }

            letters.value.push({
                id: Date.now(), from: sender.id, to: letterForm.toId,
                content: letterForm.content, timestamp: Date.now(),
                cardCost: cost, likes: [], read: false
            });

            await saveData();
            letterForm.content = '';
            letterForm.toId    = '';
            letterForm.cost    = 1;
            recipientInput.value = '';
            switchTab('wall');

        // ── 信件彈窗 ──
        const openLetter = ref(null);

        const getTerrainAt = (xPct, yPct) => {
            const el = document.getElementById('island-container');
            if (!el || !window.islandEngine) return { ci: -1, hl: 0, onIsland: false };
            const W = el.clientWidth, H = el.clientHeight;

            const wx = sx - W/2 + cam.x;
            const wy = sy - H/2 + cam.y;

                    ...(user.island    || []).filter(i => i.type === 'animal').map(i => i.name),
                    ...(user.warehouse || []).filter(i => i.type === 'animal').map(i => i.name),
                ]);
                const available = pool.filter(p => !owned.has(p.name));
                // 若全部都有了，就不限制（讓全收藏玩家還是能抽）
                if (available.length > 0) pool = available;
            }

            setTimeout(() => { drawResult.value = weightedRandom(pool); }, 1800);
        };

        const finishDraw = () => {
            if (drawResult.value) {
                if (!currentUser.value.warehouse) currentUser.value.warehouse = [];
                currentUser.value.warehouse.push({
                    id: Date.now(),
                    name:   drawResult.value.name,
                    emoji:  drawResult.value.emoji,
                    imgUrl: drawResult.value.imgUrl || null,
                    type:   drawType.value === 'pet' ? 'animal' : 'decor'
                });
                saveData();
            }
            isDrawing.value  = false;
            drawResult.value = null;
        };

        const triggerGacha10 = (type = 'pet', isTest = false) => {
            const cost = type === 'pet' ? 5000 : 3000;
            if (!isTest && (currentUser.value?.energy || 0) < cost) {
                alert(`能量不足 (需要 ${cost} ⚡)`); return;
            }
            if (!isTest) currentUser.value.energy -= cost;
            drawType.value    = type;
            isDrawing.value   = true;
            drawResult.value  = null;
            draw10Results.value = null;
            let pool = type === 'pet' ? gachaPool : shopItems;
            if (type === 'pet') {
                const user = currentUser.value;
                const owned = new Set([
                    ...(user.island    || []).filter(i => i.type === 'animal').map(i => i.name),
                    ...(user.warehouse || []).filter(i => i.type === 'animal').map(i => i.name),
                ]);
                const available = pool.filter(p => !owned.has(p.name));
                if (available.length > 0) pool = available;
            }
            // 保底：10連至少1個稀有或以上
            setTimeout(() => {
                const results = [];
                for (let i = 0; i < 10; i++) results.push(weightedRandom(pool));
                const hasRare = results.some(r => r.rarity === 'rare' || r.rarity === 'legend');
                if (!hasRare) {
                    // 把最後一個換成稀有保底
                    const rarePlus = pool.filter(p => p.rarity === 'rare' || p.rarity === 'legend');
                    if (rarePlus.length > 0) results[9] = weightedRandom(rarePlus);
                }
                // 排序：普通→稀有→傳說（讓傳說壓軸）
                results.sort((a, b) => {
                    const rank = { common: 0, rare: 1, legend: 2 };
                    return (rank[a.rarity] || 0) - (rank[b.rarity] || 0);
                });
                draw10Results.value = results;
            }, 1800);
        };

        const finishDraw10 = () => {
            if (draw10Results.value) {
                if (!currentUser.value.warehouse) currentUser.value.warehouse = [];
                draw10Results.value.forEach((item, i) => {
                    currentUser.value.warehouse.push({
                        id: Date.now() + i,
                        name:  item.name, emoji: item.emoji,
                        imgUrl: item.imgUrl || null,
                        type:  drawType.value === 'pet' ? 'animal' : 'decor'
                    });
                });
                saveData();
            }
            isDrawing.value     = false;
            draw10Results.value = null;
        };

        // ===== 卡池預覽 =====
        const poolPreview       = ref(null);   // 'pet' | 'decor' | null
        const poolRarityFilter  = ref('all');

        const openPool  = (type) => { poolPreview.value = type; poolRarityFilter.value = 'all'; };
        const closePool = ()     => { poolPreview.value = null; };

        const filteredPoolItems = computed(() => {
            const pool = poolPreview.value === 'pet' ? gachaPool : shopItems;
            if (poolRarityFilter.value === 'all') return pool;
            return pool.filter(i => i.rarity === poolRarityFilter.value);
        });

        const calcRate = (item, type) => {
            const pool  = type === 'pet' ? gachaPool : shopItems;
            const total = pool.reduce((s, g) => s + g.weight, 0);
            return ((item.weight / total) * 100).toFixed(1);
        };

        const handleImageError = (item) => { item.imgUrl = null; };

        // ===== Watchers =====
        watch(displayIslandItems, initAnimalStates, { deep: true });
        // 只在登入後才自動存雲端，避免未登入時觸發
        watch([users, letters], () => { if (fbUser.value) saveData(); }, { deep: true });

        onMounted(() => {
            // Firebase 認證狀態監聽，登入後才載入資料
            auth.onAuthStateChanged(async (user) => {
                fbUser.value = user;
                if (user) {
                    await initData(user.uid);
                    initAnimalStates();
                    if (!roamInterval) roamInterval = setInterval(moveAnimals, 4500);
                    setTimeout(() => {
                        window.initIslandCanvas?.();
                        setTimeout(() => updateCamBase(), 300);
                    }, 100);
                } else {
                    if (roamInterval) { clearInterval(roamInterval); roamInterval = null; }
                }
                fbLoading.value = false;
            });
        });
        onUnmounted(() => {
            if (roamInterval) clearInterval(roamInterval);
            if (islandAnimFrame) cancelAnimationFrame(islandAnimFrame);
        });

        return {
            fbUser, fbLoading, loginError, signInWithGoogle, signOut,
            users, currentUserId, currentUser, otherUsers,
            currentTab, letterForm, shopItems, displayIslandItems,
            visitingId, leaderboard, errorMsg, isDrawing, drawResult,
            animalStates, jumpStates, myLetters, unreadCount,
            getUserById, getDisplayName, getDisplayInitial, formatDate,
            switchUser, visitUser, stopVisiting, switchTab,
            sendLetter, adjustCardCost, markAsRead, toggleLike, isLiked,
            openLetter, openLetterModal,
            showAvatarModal, avatarPreviewUrl, avatarPosX, avatarPosY, onAvatarFileChange, saveAvatar,
            recipientInput, showSuggestions, filteredSuggestions,
            onRecipientInput, selectRecipient, hideSuggestions,
            buyItem: () => {}, triggerGacha, triggerGacha10, finishDraw, finishDraw10, draw10Results, handleImageError, forceReset,
            sortedLetters, getPos,
            isDragging, onDragStart, onDragMove, onDragEnd, dragState,
            onIslandMouseDown, onIslandMouseMove, onIslandMouseUp, centerHomeIsland, camTick,
            tiles_used,
            poolPreview, poolRarityFilter, openPool, closePool,
            filteredPoolItems, calcRate,
            isEditMode, toggleEditMode, warehouseCollapsed, warehouseItems, groupedWarehouse,
            helpTab, openHelpSecs, helpTitles, helpSections, helpContents, openHelp, toggleHelpSec,
            firstLoginHelp,
            inboxTab, unreadLetterCount, unclaimedRewards, claimReward,
            warehouseFilter, filteredWarehouse,
            placeOnIsland, removeFromIsland,
            getFlip, toggleFlip, getHighlandLift, getTerrainAt,
            scaleItem,
            selectedLayerItem, selectLayerItem, moveLayer, getItemZIndex,
            showIslandEditor, openIslandEditor, closeIslandEditor,
            islandTool, islandBrush, islandTools, islandEditorHint,
            islandAddTile, islandCenterView, islandReset, islandEditMode
        };
    }
}).mount('#app');
</script>

/* ── 共用資料 ── */
const tiles = new Map();
let wave = 0;

function load(){
  try{
    const raw=localStorage.getItem(SK);
    if(raw){ tiles.clear(); JSON.parse(raw).forEach(({tx,ty,cells})=>tiles.set(TK(tx,ty),{tx,ty,cells:new Uint8Array(cells)})); }
  }catch(e){}
  if(!tiles.size) tiles.set(TK(0,0),{tx:0,ty:0,cells:new Uint8Array(CELL*CELL)});
}
function save(){
  localStorage.setItem(SK,JSON.stringify([...tiles.values()].map(({tx,ty,cells})=>({tx,ty,cells:Array.from(cells)}))));
}

/* ── 地塊彈跳特效 ── */
const spawnAnims  = new Map(); // TK -> startTime(ms) 新增動畫
const shrinkAnims = new Map(); // TK -> startTime(ms) 消失動畫
const SPAWN_MS    = 700;
const SHRINK_MS   = 350;

function spawnTile(k){ spawnAnims.set(k, performance.now()); }
function shrinkTile(k){ shrinkAnims.set(k, performance.now()); }

function tileScale(k){
  // 消失動畫中？
  const t0s = shrinkAnims.get(k);
  if(t0s != null){
    const t = Math.min((performance.now()-t0s)/SHRINK_MS, 1);
    if(t >= 1){ shrinkAnims.delete(k); return null; } // null = 跳過渲染
    // scale 1 → 1.08 → 0（先微微放大再快速縮小消失）
    if(t < 0.2) return 1 + t/0.2 * 0.08;
    return 1.08 * (1 - (t-0.2)/0.8);
  }
  // 彈跳出現動畫？
  const t0 = spawnAnims.get(k);
  if(t0 == null) return 1;
  const t = Math.min((performance.now()-t0)/SPAWN_MS, 1);
  if(t >= 1){ spawnAnims.delete(k); return 1; }
  if(t < 0.28) return t/0.28 * 1.18;
  if(t < 0.46) return 1.18 - (t-0.28)/0.18 * 0.26;
  if(t < 0.62) return 0.92 + (t-0.46)/0.16 * 0.11;
  if(t < 0.78) return 1.03 - (t-0.62)/0.16 * 0.04;
  return 0.99 + (t-0.78)/0.22 * 0.01;
}

/* ── 共用渲染 ── */
function poly(ctx, pts, ox, oy, fill){
  ctx.beginPath(); pts.forEach(([dx,dy],i)=>i===0?ctx.moveTo(ox+dx,oy+dy):ctx.lineTo(ox+dx,oy+dy)); ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
}

function drawScene(ctx, W, H, camX, camY, editMode){
  // 背景海面
  ctx.fillStyle=OF; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.strokeStyle=OS; ctx.globalAlpha=0.22; ctx.lineWidth=1.5;
  for(let i=0;i<4;i++){
    const y=40+i*65+Math.sin(wave*0.6+i)*5;
    ctx.beginPath();
    for(let x=0;x<=W+60;x+=55){ const yy=y+Math.sin(wave*0.9+x*0.03+i)*5; x===0?ctx.moveTo(x,yy):ctx.quadraticCurveTo(x-27,yy-5,x,yy); }
    ctx.stroke();
  }
  ctx.restore();

  function origin(tx,ty){ const b=iso(tx*CELL,ty*CELL); return{x:b.x-camX+W/2,y:b.y-camY+H/2}; }
  // ghost tiles：正在消失動畫中的地塊（已從 tiles 刪除，但還要渲染）
  const ghostTiles = [];
  shrinkAnims.forEach((t0, k) => {
    if(!tiles.has(k)){
      const [tx,ty] = k.split(',').map(Number);
      ghostTiles.push({tx, ty, cells: new Uint8Array(CELL*CELL)});
    }
  });
  const sorted=[...tiles.values(), ...ghostTiles].sort((a,b)=>(a.tx+a.ty)-(b.tx+b.ty));

  /* ── PASS 1：土層側面 + 草地 SVG（無 clip，允許相互覆蓋，先全部畫完） ── */
  sorted.forEach(({tx,ty,cells})=>{
    const{x:ox,y:oy}=origin(tx,ty);
    const C1=iso(CELL,0),C2=iso(CELL,CELL),C3=iso(0,CELL);
    const hF=tiles.has(TK(tx,ty+1)),hL=tiles.has(TK(tx-1,ty));
    const allGrass=[...cells].every(c=>c===0);
    const k=TK(tx,ty), sc=tileScale(k);
    if(sc === null) return; // 消失動畫結束，跳過

    ctx.save();
    if(sc!==1){
      // 以地塊視覺中心為基準做 scale
      const cx=ox+iso(CELL/2,CELL/2).x, cy=oy+iso(CELL/2,CELL/2).y;
      ctx.translate(cx,cy); ctx.scale(sc,sc); ctx.translate(-cx,-cy);
    }

    // 土層側面（混合地塊才補，純草地由 SVG 自帶）
    if(!allGrass){
      if(!hF) poly(ctx,[[C1.x,C1.y],[C2.x,C2.y],[C2.x,C2.y+DEPTH],[C1.x,C1.y+DEPTH]],ox,oy,SIDE_R);
      if(!hL) poly(ctx,[[C3.x,C3.y],[C2.x,C2.y],[C2.x,C2.y+DEPTH],[C3.x,C3.y+DEPTH]],ox,oy,SIDE_L);
      if(!hF&&!hL){
        poly(ctx,[[C2.x,C2.y],[C2.x,C2.y+DEPTH],[C3.x,C3.y+DEPTH]],ox,oy,'#9A6030');
        poly(ctx,[[C2.x,C2.y],[C2.x,C2.y+DEPTH],[C1.x,C1.y+DEPTH]],ox,oy,'#9A6030');
      }
    }
    // 草地 SVG
    if(_imgsReady&&IMGS.grass) ctx.drawImage(IMGS.grass,ox-HW*CELL,oy,HW*CELL*2,HH*CELL*2+DEPTH);
    ctx.restore();
  });

  /* ── PASS 2：水格 + 高地（全部草地畫完後再蓋，永遠在草地上方） ── */
  sorted.forEach(({tx,ty,cells})=>{
    const k=TK(tx,ty), sc=tileScale(k);
    if(sc === null || sc === 0) return; // 消失動畫結束，跳過
    const{x:ox,y:oy}=origin(tx,ty);
    const cx2=ox+iso(CELL/2,CELL/2).x, cy2=oy+iso(CELL/2,CELL/2).y;
    ctx.save();
    if(sc!==1){ ctx.translate(cx2,cy2); ctx.scale(sc,sc); ctx.translate(-cx2,-cy2); }
    for(let s=0;s<CELL*2-1;s++){
      for(let col=0;col<CELL;col++){
        const row=s-col; if(row<0||row>=CELL) continue;
        const ci=cells[row*CELL+col]; if(ci===0) continue;
        const hl=ci>=2?ci-1:0, rz=hl*HLIFT;
        const P=iso(col,row,rz);
        const topX=ox+P.x, topY=oy+P.y;
        if(ci===1&&_imgsReady&&IMGS.water){
          ctx.drawImage(IMGS.water,topX-HW,topY,HW*2,HH*2);
        } else if(ci>=2&&_imgsReady&&IMGS.highland){
          for(let l=0;l<hl;l++){
            const lP=iso(col,row,l*HLIFT);
            ctx.drawImage(IMGS.highland,ox+lP.x-HW,oy+lP.y-8.51,HW*2,36.51);
          }
        }
      }
    }
    ctx.restore();
  });

  /* ── PASS 3（編輯模式）：格線 + 地塊外框 ── */
  if(editMode){
    sorted.forEach(({tx,ty,cells})=>{
      const{x:ox,y:oy}=origin(tx,ty);
      const C1=iso(CELL,0),C2=iso(CELL,CELL),C3=iso(0,CELL),C0=iso(0,0);
      for(let s=0;s<CELL*2-1;s++){
        for(let col=0;col<CELL;col++){
          const row=s-col; if(row<0||row>=CELL) continue;
          const ci=cells[row*CELL+col],hl=ci>=2?ci-1:0,rz=hl*HLIFT;
          const P=iso(col,row,rz),R=iso(col+1,row,rz),Sv=iso(col+1,row+1,rz),Q=iso(col,row+1,rz);
          ctx.beginPath(); ctx.moveTo(ox+P.x,oy+P.y); ctx.lineTo(ox+R.x,oy+R.y); ctx.lineTo(ox+Sv.x,oy+Sv.y); ctx.lineTo(ox+Q.x,oy+Q.y); ctx.closePath();
          ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=0.6; ctx.stroke();
        }
      }
      ctx.beginPath(); [C0,C1,C2,C3].forEach((c,i)=>i===0?ctx.moveTo(ox+c.x,oy+c.y):ctx.lineTo(ox+c.x,oy+c.y)); ctx.closePath();
      ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1.5; ctx.setLineDash([6,4]); ctx.stroke(); ctx.setLineDash([]);
    });
  }
}

/* ── Camera ── */
function autoCenter(cam, W, H){
  if(!tiles.size) return;
  let sx=0,sy=0;
  tiles.forEach(({tx,ty})=>{ const b=iso(tx*CELL,ty*CELL); sx+=b.x+(HW*CELL/2); sy+=b.y+(HH*CELL/2); });
  cam.x = sx/tiles.size;
  cam.y = sy/tiles.size - H*0.08;
}

/* ════════════════════════════════════
   Home Canvas（純預覽，浮動動畫）
════════════════════════════════════ */
let hCv=null, hCx=null, hCam={x:0,y:0}, hRaf=null;

function hResize(){
  if(!hCv) return;
  const p=hCv.parentElement; if(!p) return;
  const w=p.clientWidth||p.offsetWidth, h=p.clientHeight||p.offsetHeight;
  if(w>0&&h>0&&(hCv.width!==w||hCv.height!==h)){ hCv.width=w; hCv.height=h; autoCenter(hCam,w,h); }
}

window.initIslandCanvas = function(){
  function tryInit(){
    const c=document.getElementById('island-canvas'); if(!c){ setTimeout(tryInit,100); return; }
    const p=c.parentElement; if(!p||p.clientWidth===0){ setTimeout(tryInit,100); return; }
    hCv=c; hCx=c.getContext('2d');
    // Firestore 地形由 initData 透過 importTiles 載入，這裡只在完全沒資料時才 fallback 到 localStorage
    if(!tiles.size) load();
    hResize();
    if(window._hRO) window._hRO.disconnect();
    window._hRO=new ResizeObserver(hResize); window._hRO.observe(p);
    if(hRaf) cancelAnimationFrame(hRaf);
    const ov=document.getElementById('island-overlay');
    let ovCx=ov?ov.getContext('2d'):null;
    function loop(){
      hResize();
      const W=hCv.width, H=hCv.height;
      if(W>0&&H>0){
        drawScene(hCx,W,H,hCam.x,hCam.y,false);
        if(ovCx){ ov.width=W; ov.height=H; ovCx.clearRect(0,0,W,H); }
      }
      wave+=0.033; hRaf=requestAnimationFrame(loop);
    }
    hRaf=requestAnimationFrame(loop);
  }
  requestAnimationFrame(tryInit);
};

/* ════════════════════════════════════
   Editor Canvas（互動編輯）
════════════════════════════════════ */
let eCv=null, eCx=null, eCam={x:0,y:0}, eRaf=null;
let ePan=null, ePanSnap=null, ePaint=false, eHover=null;

/* 工具讀取（從 Vue DOM） */
function eTool(){ return window._islandTool || document.querySelector('.is-btn.active[data-tool],.imb-btn.active[data-tool]')?.dataset?.tool||'pan'; }
function eBrush(){ return parseInt(document.querySelector('.is-sz.active,.imb-sz.active')?.textContent)||1; }
function eEditing(){ return !!window._islandEditing; }

function eBrushCells(col,row){ const r=eBrush()-1,a=[]; for(let dr=-r;dr<=r;dr++) for(let dc=-r;dc<=r;dc++) a.push({c:col+dc,r:row+dr}); return a; }

/* Hit test */
function eDiamond(px,py,cx,cy,hw,hh){ return Math.abs(px-cx)/hw+Math.abs(py-cy)/hh<=1; }
function eHitTile(sx,sy){
  return [...tiles.values()].sort((a,b)=>(b.tx+b.ty)-(a.tx+a.ty)).find(({tx,ty})=>{
    const b=iso(tx*CELL,ty*CELL), ox=b.x-eCam.x+eCv.width/2, oy=b.y-eCam.y+eCv.height/2;
    return eDiamond(sx,sy,ox+iso(CELL/2,CELL/2).x,oy+iso(CELL/2,CELL/2).y,HW*CELL,HH*CELL);
  })||null;
}
function eHitCell(sx,sy,tile){
  const b=iso(tile.tx*CELL,tile.ty*CELL), ox=b.x-eCam.x+eCv.width/2, oy=b.y-eCam.y+eCv.height/2;
  for(let col=0;col<CELL;col++) for(let row=0;row<CELL;row++){
    const ci=tile.cells[row*CELL+col],hl=ci>=2?ci-1:0,rz=hl*HLIFT;
    const P=iso(col,row,rz),R=iso(col+1,row,rz),S=iso(col+1,row+1,rz),Q=iso(col,row+1,rz);
    if(eDiamond(sx,sy,ox+(P.x+R.x+S.x+Q.x)/4,oy+(P.y+R.y+S.y+Q.y)/4,HW,HH)) return {col,row};
  }
  return null;
}

/* Apply tool */
function eApply(tile,col,row,tool){
  eBrushCells(col,row).forEach(({c,r})=>{
    if(c<0||c>=CELL||r<0||r>=CELL) return;
    const cur=tile.cells[r*CELL+c];
    if(tool==='grass') tile.cells[r*CELL+c]=0;
    else if(tool==='water'&&cur===0) tile.cells[r*CELL+c]=1;
    else if(tool==='highland'){ if(cur===0) tile.cells[r*CELL+c]=2; else if(cur>=2&&cur<1+MAX_HL) tile.cells[r*CELL+c]=cur+1; }
  });
}

/* Hover overlay */
function eDrawHover(){
  if(!eHover) return;
  const {tile,col,row}=eHover;
  const b=iso(tile.tx*CELL,tile.ty*CELL), ox=b.x-eCam.x+eCv.width/2, oy=b.y-eCam.y+eCv.height/2;
  eBrushCells(col,row).forEach(({c,r})=>{
    if(c<0||c>=CELL||r<0||r>=CELL) return;
    const ci=tile.cells[r*CELL+c],hl=ci>=2?ci-1:0,rz=hl*HLIFT;
    const P=iso(c,r,rz),R=iso(c+1,r,rz),S=iso(c+1,r+1,rz),Q=iso(c,r+1,rz);
    eCx.beginPath(); eCx.moveTo(ox+P.x,oy+P.y); eCx.lineTo(ox+R.x,oy+R.y); eCx.lineTo(ox+S.x,oy+S.y); eCx.lineTo(ox+Q.x,oy+Q.y); eCx.closePath();
    eCx.fillStyle='rgba(255,255,255,0.3)'; eCx.fill();
  });
}

/* Pointer events */
function ePos(e){
  const rc=eCv.getBoundingClientRect(), sx=eCv.width/rc.width, sy=eCv.height/rc.height;
  const src=e.touches?e.touches[0]:(e.changedTouches||[e])[0];
  return {x:(src.clientX-rc.left)*sx, y:(src.clientY-rc.top)*sy, cx:src.clientX, cy:src.clientY};
}
function eDown(e){
  e.preventDefault(); const p=ePos(e);
  const ed=eEditing(), tool=ed?eTool():'pan';
  if(!ed||tool==='pan'){ ePan={cx:p.cx,cy:p.cy}; ePanSnap={x:eCam.x,y:eCam.y}; eCv.style.cursor='grabbing'; return; }
  // 純 click 模式：只在 pointerdown 那一瞬間執行，move 不繼續繪製
  const tile=eHitTile(p.x,p.y);
  if(tile){
    if(tool==='shrink'){
      const k=TK(tile.tx,tile.ty);
      shrinkTile(k); // 先播消失動畫
      setTimeout(()=>{ tiles.delete(k); save(); }, SHRINK_MS + 50);
      return;
    }
    const cell=eHitCell(p.x,p.y,tile); if(cell){ eApply(tile,cell.col,cell.row,tool); save(); }
  } else if(tool==='expand'){
    const wx=p.x-eCv.width/2+eCam.x, wy=p.y-eCv.height/2+eCam.y;
    const d=wx/HW, s=wy/HH;
    const tx=Math.floor((d+s)/2/CELL), ty=Math.floor((s-d)/2/CELL), k=TK(tx,ty);
    // 板塊限制：檢查使用者剩餘板塊數
    const budget = window._tileCount||6;
    if(tiles.size >= budget){
      window._onTileLimit?.(); // 通知 Vue 顯示提示
      return;
    }
    if(!tiles.has(k)&&(tiles.size===0||nbrs(tx,ty).some(n=>tiles.has(TK(n.tx,n.ty))))){
      tiles.set(k,{tx,ty,cells:new Uint8Array(CELL*CELL)}); save();
      spawnTile(k); // 彈跳特效
    }
  }
  // 不設 ePaint，確保 move 完全不繪製
}
function eMove(e){
  e.preventDefault(); const p=ePos(e); eHover=null;
  if(ePan){
    const rc=eCv.getBoundingClientRect();
    eCam.x=ePanSnap.x-(p.cx-ePan.cx)*(eCv.width/rc.width);
    eCam.y=ePanSnap.y-(p.cy-ePan.cy)*(eCv.height/rc.height);
    return;
  }
  // move 只更新 hover 高亮，絕對不繪製地形
  if(eEditing()){ const tile=eHitTile(p.x,p.y); if(tile){const cell=eHitCell(p.x,p.y,tile);if(cell)eHover={tile,col:cell.col,row:cell.row};} }
}
function eUp(e){ if(ePan){ePan=null;ePanSnap=null;if(eCv)eCv.style.cursor='grab';} ePaint=false; }
function eLeave(){ ePan=null; ePaint=false; eHover=null; }

// 在 window 層監聽 pointerup，確保滑鼠移出 canvas 後放開也能正確停止
if(!window._editorUpBound){
  window._editorUpBound = true;
  window.addEventListener('pointerup', ()=>{ if(ePaint){save();ePaint=false;} if(ePan){ePan=null;ePanSnap=null;if(eCv)eCv.style.cursor='grab';} });
}

function eResize(){
  if(!eCv) return;
  const p=eCv.parentElement; if(!p) return;
  const w=p.clientWidth||p.offsetWidth, h=p.clientHeight||p.offsetHeight||window.innerHeight*0.7;
  if(w>0&&h>0){ eCv.width=w; eCv.height=h; }
}

window.initIslandEditorCanvas = function(){
  function tryInit(){
    const c=document.getElementById('island-editor-canvas'); if(!c){ setTimeout(tryInit,100); return; }
    const p=c.parentElement; if(!p||p.clientWidth===0){ setTimeout(tryInit,150); return; }
    eCv=c; eCx=c.getContext('2d');
    // 地形由 Firestore 透過 importTiles 載入，這裡不再讀 localStorage
    // 只在完全沒資料時 fallback
    if(!tiles.size) load();
    eResize();
    autoCenter(eCam, eCv.width, eCv.height);
    // 每次進入編輯器重置繪製狀態，防止殘留 ePaint=true 導致一進場就繪製
    ePan=null; ePanSnap=null; ePaint=false; eHover=null;
    eCv.style.cursor='grab';
    // 事件（防重複）
    ['pointerdown','pointermove','pointerup','pointerleave'].forEach(ev=>c.removeEventListener(ev,c['_'+ev]));
    c['_pointerdown']=eDown; c['_pointermove']=eMove; c['_pointerup']=eUp; c['_pointerleave']=eLeave;
    c.addEventListener('pointerdown',eDown,{passive:false});
    c.addEventListener('pointermove',eMove,{passive:false});
    c.addEventListener('pointerup',eUp);
    c.addEventListener('pointerleave',eLeave);
    // ResizeObserver
    if(window._eRO) window._eRO.disconnect();
    window._eRO=new ResizeObserver(()=>{ eResize(); });
    window._eRO.observe(p);
    // render loop
    if(eRaf) cancelAnimationFrame(eRaf);
    function loop(){
      eResize();
      if(eCv.width>0&&eCv.height>0){
        drawScene(eCx, eCv.width, eCv.height, eCam.x, eCam.y, eEditing());
        if(eEditing()) eDrawHover();
      }
      wave+=0.033; eRaf=requestAnimationFrame(loop);
    }
    eRaf=requestAnimationFrame(loop);
  }
  requestAnimationFrame(tryInit);
};

/* ── Public API ── */
window.islandEngine={
  save(){
    save(); // localStorage
    // 同步存 Firestore（若已登入）
    const user = window._fbUser;
    if(user){
      db.collection('tiles').doc(user.uid).set({
        tiles: [...tiles.values()].map(({tx,ty,cells})=>({tx,ty,cells:Array.from(cells)})),
        updatedAt: Date.now()
      }).catch(()=>{});
    }
  },
  center(){ if(hCv) autoCenter(hCam,hCv.width,hCv.height); },
  get cam(){ return hCam; },
  getTile(tx,ty){ return tiles.get(TK(tx,ty))||null; },
  exportTiles(){
    return [...tiles.values()].map(({tx,ty,cells})=>({tx,ty,cells:Array.from(cells)}));
  },
  importTiles(arr){
    if(!arr||!arr.length) return;
    tiles.clear();
    arr.forEach(({tx,ty,cells})=>tiles.set(TK(tx,ty),{tx,ty,cells:new Uint8Array(cells)}));
  },
  isOnIsland(xPct, yPct, W, H){
    const cam=hCam;
    const sx=xPct/100*W, sy=yPct/100*H;
    const wx=sx-W/2+cam.x, wy=sy-H/2+cam.y;
    const d=wx/HW, s=wy/HH;
    const gc=(d+s)/2, gr=(s-d)/2;
    const tx=Math.floor(gc/CELL), ty=Math.floor(gr/CELL);
    return tiles.has(TK(tx,ty));
  },
};
window.islandEditorEngine={
  addTile(){
    // 確保 tiles 有資料
    if(!tiles.size) load();
    const cands=new Set();
    tiles.forEach(t=>nbrs(t.tx,t.ty).forEach(n=>{
      if(!tiles.has(TK(n.tx,n.ty))) cands.add(TK(n.tx,n.ty));
    }));
    if(!cands.size){
      if(!tiles.has(TK(1,0))) tiles.set(TK(1,0),{tx:1,ty:0,cells:new Uint8Array(CELL*CELL)});
      save(); return;
    }
    let best=null, bs=-Infinity;
    cands.forEach(k=>{const[tx,ty]=k.split(',').map(Number);const s=tx+ty;if(s>bs){bs=s;best={tx,ty};}});
    if(best){
      const bk=TK(best.tx,best.ty);
      tiles.set(bk,{tx:best.tx,ty:best.ty,cells:new Uint8Array(CELL*CELL)});
      save();
      spawnTile(bk); // 彈跳特效
      if(eCv) autoCenter(eCam,eCv.width,eCv.height);
    }
  },
  center(){ if(eCv) autoCenter(eCam,eCv.width,eCv.height); },
  reset(){
    tiles.clear(); tiles.set(TK(0,0),{tx:0,ty:0,cells:new Uint8Array(CELL*CELL)});
    window.islandEngine.save(); // 使用 islandEngine.save 確保同步 Firestore
    if(eCv) autoCenter(eCam,eCv.width,eCv.height);
  },
};

/* ── 啟動（頁面載入時立刻讀資料）── */
load();
})();
</script>
